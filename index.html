<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSE_QUIZ</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="header">
  <div class="emoji">🪔 🎉 🪷 🎨 🎊 🪔</div>

  <p class="dept">Department of Computer Science</p>

  <h1 class="title">Quiz Fest 2026</h1>

  <p class="subtitle">Indian Cultural Theme</p>
</div>

  <!-- CATEGORY -->
  <div id="category-box">
    <button onclick="startQuiz('history')">Ancient History</button>
    <button onclick="startQuiz('tech')">Latest Technology</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-box" class="hidden">
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="feedback"></p>
    <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next</button>
    <div id="progress" style="height:8px;background:#444;border-radius:5px;margin-bottom:10px;">
  <div id="progressBar" style="height:100%;width:0%;background : #26a69a;border-radius:5px;"></div>
</div>
  </div>

  <!-- SCORE -->
  <div id="score-box" class="hidden">
    <h2>Your Score: <span id="score"></span>/25</h2>
    <button onclick="location.reload()">Restart</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
