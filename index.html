<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <h1>Quick Quiz</h1>

  <!-- CATEGORY -->
  <div id="category-box">
    <button onclick="startQuiz('history')">Ancient History</button>
    <button onclick="startQuiz('tech')">Latest Technology</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-box" class="hidden">
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="feedback"></p>
    <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next</button>
  </div>

  <!-- SCORE -->
  <div id="score-box" class="hidden">
    <h2>Your Score: <span id="score"></span>/10</h2>
    <button onclick="location.reload()">Restart</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
